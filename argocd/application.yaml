apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: myapp
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/BinhMinh04/k8s-devsecops-config
    targetRevision: main
    path: helm/myapp
  destination:
    server: https://kubernetes.default.svc
    namespace: myapp
  syncPolicy:
    automated:
      prune: true        # xóa resource không còn trong Git
      selfHeal: true     # revert nếu ai sửa tay trong cluster
    syncOptions:
      - CreateNamespace=true   # tự tạo namespace nếu chưa có