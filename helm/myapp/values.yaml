replicaCount: 1

image:
  repository: ghcr.io/binhminh04/k8s-devsecops-platform
  pullPolicy: Always
  tag: "latest"         # CI sẽ tự update dòng này
  
imagePullSecrets:
  - name: ghcr-secret
service:
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  enabled: true
  host: myapp.local

resources:
  limits:
    cpu: 200m
    memory: 128Mi
  requests:
    cpu: 100m
    memory: 64Mi

livenessProbe:
  path: /health
readinessProbe:
  path: /health